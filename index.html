<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Harshad's Mailbox</title>
<script>
(function() {
  var saved = localStorage.getItem('digest-theme');
  document.documentElement.setAttribute('data-theme', saved || 'dark');
})();
</script>
<style>
  :root {
    --orange-clay: #C97A41;
    --green-moss: #6A7350;
    --white-linen: #F5F2EB;
    --dark-stone: #0F1B26;
    --grey-steel: #C8CBCF;
    --white: #FFFFFF;
    --error-bg: #fdecea;
    --error-text: #b71c1c;
  }
  :root[data-theme="dark"] {
    --orange-clay: #E0935C;
    --green-moss: #93A877;
    --white-linen: #14181B;
    --dark-stone: #ECEAE3;
    --grey-steel: #3A3F44;
    --white: #1E2327;
    --error-bg: #3A1F1F;
    --error-text: #FF8A80;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, "Inter", "Segoe UI", Roboto, sans-serif;
    background: var(--white-linen);
    color: var(--dark-stone);
    padding: 0;
    margin: 0;
  }
  .app-shell {
    display: grid;
    grid-template-columns: 240px minmax(0,1fr);
    max-width: 1040px;
    margin: 0 auto;
    min-height: 100vh;
  }
  .main-content { padding: 16px 20px; min-width: 0; }
  @media (max-width: 720px) {
    .app-shell { grid-template-columns: 1fr; }
  }

  .sidebar {
    background: var(--white);
    border-right: 1px solid var(--grey-steel);
    padding: 20px 14px;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  @media (max-width: 720px) {
    .sidebar {
      flex-direction: row;
      flex-wrap: wrap;
      border-right: none;
      border-bottom: 1px solid var(--grey-steel);
      padding: 12px 14px;
      align-items: center;
    }
    .sidebar-section-title { width: 100%; }
  }
  .sidebar-brand {
    font-size: 0.95rem;
    font-weight: 800;
    margin-bottom: 14px;
  }
  @media (max-width: 720px) { .sidebar-brand { width: 100%; margin-bottom: 8px; } }
  .nav-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 7px 8px;
    border-radius: 6px;
    font-size: 0.85rem;
    color: var(--dark-stone);
    opacity: 0.75;
    cursor: pointer;
  }
  .nav-item:hover { background: var(--white-linen); }
  .nav-item.active { background: var(--white-linen); opacity: 1; font-weight: 700; color: var(--orange-clay); }
  .nav-item.disabled { opacity: 0.4; cursor: default; }
  .nav-item.disabled:hover { background: none; }
  .sidebar-section-title {
    font-size: 0.65rem;
    font-weight: 700;
    color: var(--green-moss);
    text-transform: uppercase;
    letter-spacing: 0.04em;
    margin: 16px 0 4px;
    padding: 0 8px;
  }
  .account-row {
    display: flex;
    align-items: flex-start;
    gap: 7px;
    padding: 5px 8px;
    font-size: 0.78rem;
    word-break: break-all;
    line-height: 1.3;
  }
  .account-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .account-dot.ok  { background: #3B6D11; }
  .account-dot.err { background: #A32D2D; }
  header {
    padding: 16px 0 12px;
    margin-bottom: 8px;
  }
  h1 {
    font-size: 1.4rem;
    font-weight: 800;
  }
  .meta {
    font-size: 0.8rem;
    color: var(--green-moss);
    margin-top: 4px;
  }
  .empty {
    text-align: center;
    padding: 60px 20px;
    color: var(--green-moss);
  }
  .error {
    background: var(--error-bg);
    color: var(--error-text);
    padding: 12px;
    border-radius: 8px;
    font-size: 0.85rem;
  }

  /* Sticky toolbar: search + filter chips */
  .toolbar {
    position: sticky;
    top: 0;
    background: var(--white-linen);
    padding: 10px 0;
    border-bottom: 2px solid var(--grey-steel);
    margin-bottom: 14px;
    z-index: 10;
  }
  .search-input {
    width: 100%;
    padding: 8px 12px;
    border: 1px solid var(--grey-steel);
    border-radius: 8px;
    font-size: 0.85rem;
    outline: none;
    margin-bottom: 8px;
    background: var(--white);
    color: var(--dark-stone);
  }
  .search-input:focus { border-color: var(--orange-clay); }
  .filter-chips { display: flex; gap: 6px; flex-wrap: wrap; }
  .chip {
    font-size: 0.75rem;
    font-weight: 700;
    padding: 4px 12px;
    border-radius: 999px;
    border: 1px solid var(--grey-steel);
    background: var(--white);
    color: var(--dark-stone);
    cursor: pointer;
    opacity: 0.65;
  }
  .chip.active { opacity: 1; border-color: transparent; color: var(--white); }
  .chip.active[data-pri="all"]    { background: var(--dark-stone); }
  .chip.active[data-pri="high"]   { background: var(--orange-clay); }
  .chip.active[data-pri="medium"] { background: var(--green-moss); }
  .chip.active[data-pri="low"]    { background: var(--grey-steel); color: var(--dark-stone); }

  /* Date group headers */
  .date-group-label {
    font-size: 0.7rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    color: var(--green-moss);
    margin: 18px 4px 8px;
  }
  .date-group-label:first-child { margin-top: 0; }

  /* Inbox list container */
  .inbox-list {
    background: var(--white);
    border-radius: 10px;
    border: 1px solid var(--grey-steel);
    overflow: hidden;
  }

  /* Row */
  .row {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 10px 12px;
    border-bottom: 1px solid var(--white-linen);
    border-left: 3px solid var(--grey-steel);
    cursor: pointer;
  }
  .row:last-child { border-bottom: none; }
  .row:hover { background: var(--white-linen); }
  .row.high   { border-left-color: var(--orange-clay); }
  .row.medium { border-left-color: var(--green-moss); }
  .row.low    { border-left-color: var(--grey-steel); }

  .avatar {
    width: 30px; height: 30px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.7rem; font-weight: 700;
    flex-shrink: 0;
    color: var(--white);
  }

  .row-main { flex: 1; min-width: 0; }
  .row-top {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 8px;
    min-width: 0;
  }
  .row-subject {
    font-weight: 700;
    font-size: 0.9rem;
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .row-time {
    font-size: 0.7rem;
    color: var(--dark-stone);
    opacity: 0.55;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .row-preview {
    font-size: 0.8rem;
    color: var(--dark-stone);
    opacity: 0.7;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    margin-top: 2px;
  }

  /* Expanded detail */
  .row-detail {
    display: none;
    margin-top: 8px;
    padding-top: 8px;
    border-top: 1px solid var(--white-linen);
    font-size: 0.85rem;
    line-height: 1.45;
  }
  .row.expanded .row-detail { display: block; }
  .row.expanded .row-preview { display: none; }
  .row-detail .from-line {
    font-size: 0.75rem;
    color: var(--dark-stone);
    opacity: 0.65;
    margin-bottom: 6px;
  }
  .row-detail .snippet-full {
    margin-bottom: 6px;
  }
  .row-detail .attachment-line {
    font-size: 0.75rem;
    color: var(--dark-stone);
    opacity: 0.7;
    margin-bottom: 6px;
  }
  .row-detail .reason-full {
    color: var(--green-moss);
    font-style: italic;
    font-size: 0.8rem;
  }
  .action-row {
    display: flex;
    gap: 8px;
    margin-top: 10px;
  }
  .reply-btn, .open-btn {
    padding: 6px 14px;
    border: none;
    border-radius: 6px;
    font-size: 0.75rem;
    font-weight: 700;
    cursor: pointer;
  }
  .reply-btn { background: var(--orange-clay); color: var(--white); }
  .open-btn { background: var(--green-moss); color: var(--white); }
  .reply-btn:hover, .open-btn:hover { opacity: 0.9; }

  #auth-screen {
    position: fixed; inset: 0;
    background: var(--white-linen);
    display: flex; align-items: center; justify-content: center;
    z-index: 999;
  }
  .auth-box {
    background: var(--white);
    border-radius: 12px;
    padding: 32px 28px;
    width: 100%; max-width: 340px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.10);
    text-align: center;
  }
  .auth-box h2 { font-size: 1.2rem; margin-bottom: 6px; }
  .auth-box p  { font-size: 0.8rem; color: var(--green-moss); margin-bottom: 20px; }
  .auth-box input {
    width: 100%; padding: 10px 12px;
    border: 1px solid var(--grey-steel); border-radius: 6px;
    font-size: 0.95rem; margin-bottom: 12px;
    outline: none; box-sizing: border-box;
  }
  .auth-box input:focus { border-color: var(--orange-clay); }
  .auth-box button {
    width: 100%; padding: 10px;
    background: var(--orange-clay); color: #fff;
    border: none; border-radius: 6px;
    font-size: 0.95rem; font-weight: 700; cursor: pointer;
  }
  .auth-box button:hover { opacity: 0.9; }
  .auth-error { color: var(--error-text); font-size: 0.8rem; margin-top: 8px; display: none; }

  .header-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; }
  .greeting { font-size: 1.15rem; font-weight: 800; margin-top: 2px; }
  .theme-toggle {
    font-size: 0.8rem; cursor: pointer; user-select: none;
    padding: 6px 10px; border-radius: 6px; border: 1px solid var(--grey-steel);
  }
  .theme-toggle:hover { background: var(--white-linen); }
  .user-avatar {
    width: 36px; height: 36px; border-radius: 50%;
    background: var(--orange-clay); color: var(--white);
    display: flex; align-items: center; justify-content: center;
    font-size: 0.8rem; font-weight: 700; flex-shrink: 0;
  }

  .stat-cards {
    display: grid; grid-template-columns: repeat(4, minmax(0,1fr));
    gap: 8px; margin: 14px 0;
  }
  @media (max-width: 480px) {
    .stat-cards { grid-template-columns: repeat(2, minmax(0,1fr)); }
  }
  .stat-card { background: var(--white); border-radius: 8px; padding: 10px 12px; }
  .stat-label { font-size: 0.65rem; color: var(--green-moss); }
  .stat-value { font-size: 1.3rem; font-weight: 800; margin-top: 2px; }

  .filter-row { display: flex; justify-content: space-between; align-items: center; gap: 8px; }
  .handled-toggle {
    font-size: 0.75rem; color: var(--green-moss); cursor: pointer;
    text-decoration: underline; white-space: nowrap; flex-shrink: 0;
  }
  .handled-toggle.active-toggle { color: var(--orange-clay); font-weight: 700; }

  .row-checkbox { margin-top: 3px; flex-shrink: 0; cursor: pointer; }
  .row.handled-view { opacity: 0.55; }
  .row.handled-view .row-subject { text-decoration: line-through; }
</style>
</head>
<body>

<div id="auth-screen">
  <div class="auth-box">
    <h2>Harshad's Mailbox</h2>
    <p>Private dashboard — enter password to continue</p>
    <input type="password" id="pwd-input" placeholder="Password" />
    <button onclick="checkPassword()">Unlock</button>
    <div class="auth-error" id="auth-error">Incorrect password. Try again.</div>
  </div>
</div>

<div class="app-shell">

  <aside class="sidebar">
    <div class="sidebar-brand">Harshad's Mailbox</div>
    <div class="nav-item active" data-nav="inbox" onclick="setNav('inbox')">Inbox</div>
    <div class="nav-item" data-nav="high" onclick="setNav('high')">High priority</div>
    <div class="nav-item" data-nav="leads" onclick="setNav('leads')">Leads</div>
    <div class="nav-item" data-nav="handled" onclick="setNav('handled')">Handled</div>
    <div class="nav-item disabled" title="Coming soon">Insights</div>
    <div class="sidebar-section-title">Accounts</div>
    <div id="sidebar-accounts"></div>
  </aside>

  <main class="main-content">
    <header>
      <div class="header-top">
        <div>
          <div class="greeting" id="greeting">Loading…</div>
          <div class="meta" id="meta"></div>
        </div>
        <div style="display:flex; align-items:center; gap:10px;">
          <span class="theme-toggle" id="theme-toggle" onclick="toggleTheme()"></span>
          <div class="user-avatar">HC</div>
        </div>
      </div>
      <button id="fetch-btn" onclick="triggerFetch()" style="
        margin-top:10px; padding:6px 16px;
        background:var(--orange-clay); color:#fff;
        border:none; border-radius:6px;
        font-size:0.8rem; font-weight:700; cursor:pointer;">
        Fetch Now
      </button>
      <span id="fetch-status" style="font-size:0.75rem;color:var(--green-moss);margin-left:10px;"></span>
    </header>

    <div class="stat-cards" id="stat-cards"></div>

    <div class="toolbar">
      <input type="text" class="search-input" id="search-input" placeholder="Search sender, subject, or content…" />
      <div class="filter-row">
        <div class="filter-chips" id="filter-chips">
          <span class="chip active" data-pri="all" onclick="setFilter('all')">All</span>
          <span class="chip" data-pri="high" onclick="setFilter('high')">High</span>
          <span class="chip" data-pri="medium" onclick="setFilter('medium')">Medium</span>
          <span class="chip" data-pri="low" onclick="setFilter('low')">Low</span>
        </div>
        <span class="handled-toggle" id="handled-toggle" onclick="toggleShowHandled()">Handled (0)</span>
      </div>
    </div>

    <div id="content">
      <div class="empty">Loading digest…</div>
    </div>
  </main>

</div>

<script>
// Password stored as SHA-256 hash — not plaintext
const HASH = "14f97bf0e540ba3662ca2059749de9953bafe7ce4f2a9bd86f585258577ed137";

async function sha256(str) {
  const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,"0")).join("");
}

async function checkPassword() {
  const val = document.getElementById("pwd-input").value;
  const hash = await sha256(val);
  if (hash === HASH) {
    sessionStorage.setItem("digest-auth", "1");
    document.getElementById("auth-screen").style.display = "none";
    loadDigest();
  } else {
    document.getElementById("auth-error").style.display = "block";
    document.getElementById("pwd-input").value = "";
  }
}

document.getElementById("pwd-input").addEventListener("keydown", e => {
  if (e.key === "Enter") checkPassword();
});

// Stay unlocked across refreshes within the same tab session
if (sessionStorage.getItem("digest-auth") === "1") {
  document.getElementById("auth-screen").style.display = "none";
  loadDigest();
}
</script>

<script>
let allItems = [];
let activeFilter = "all";
let activeNav = "inbox";
let rowDataMap = {};
let digestMeta = { total_checked: 0, total_important: 0 };
let showHandled = false;

function isLead(item) {
  const from = (item.from || '').toLowerCase();
  const subject = (item.subject || '').toLowerCase();
  return from.includes('enquiries@saharsh.co') ||
         subject.includes('new contact request') ||
         subject.includes('contact form');
}

let handledSet = new Set();
try {
  handledSet = new Set(JSON.parse(localStorage.getItem('digest-handled') || '[]'));
} catch (e) { handledSet = new Set(); }

function getItemId(item) {
  if (item.message_id) return item.message_id;
  return `${item.account_email}|${item.subject}|${item.date}`;
}

function isHandled(item) {
  return handledSet.has(getItemId(item));
}

function saveHandled() {
  localStorage.setItem('digest-handled', JSON.stringify(Array.from(handledSet)));
}

function toggleHandled(rowId) {
  const item = rowDataMap[rowId];
  if (!item) return;
  const id = getItemId(item);
  if (handledSet.has(id)) handledSet.delete(id);
  else handledSet.add(id);
  saveHandled();
  render();
}

function toggleShowHandled() {
  showHandled = !showHandled;
  render();
}

function setNav(key) {
  activeNav = key;
  showHandled = key === 'handled';
  activeFilter = key === 'high' ? 'high' : 'all';
  render();
}

function syncNavActive() {
  document.querySelectorAll('.nav-item[data-nav]').forEach(el => {
    el.classList.toggle('active', el.dataset.nav === activeNav);
  });
  document.querySelectorAll('.chip').forEach(c => {
    c.classList.toggle('active', !showHandled && c.dataset.pri === activeFilter);
  });
}

function setGreeting() {
  const hour = new Date().getHours();
  let part = "morning";
  if (hour >= 12 && hour < 17) part = "afternoon";
  else if (hour >= 17) part = "evening";
  document.getElementById('greeting').textContent = `Good ${part}, Harshad`;
}

function applyThemeLabel() {
  const theme = document.documentElement.getAttribute('data-theme');
  document.getElementById('theme-toggle').textContent = theme === 'dark' ? '☀ Light' : '🌙 Dark';
}

function toggleTheme() {
  const current = document.documentElement.getAttribute('data-theme');
  const next = current === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('digest-theme', next);
  applyThemeLabel();
}

applyThemeLabel();

function renderSyncStrip(accountStatus) {
  const el = document.getElementById('sidebar-accounts');
  if (!accountStatus || accountStatus.length === 0) { el.innerHTML = ''; return; }
  el.innerHTML = accountStatus.map(a => {
    const cls = a.ok ? 'ok' : 'err';
    const title = a.ok ? `${a.count} fetched` : (a.error || 'failed');
    return `<div class="account-row" title="${escapeHtml(title)}"><span class="account-dot ${cls}"></span>${escapeHtml(a.email || a.label)}</div>`;
  }).join('');
}

function renderStatCards() {
  const el = document.getElementById('stat-cards');
  const todayCount = allItems.filter(i => groupLabel(new Date(i.date)) === 'Today').length;
  const needsReply = allItems.filter(i => (i.priority || 'low') === 'high').length;
  const newLeads = allItems.filter(isLead).length;
  const noiseFiltered = Math.max(0, digestMeta.total_checked - digestMeta.total_important);
  const stats = [
    ['Important today', todayCount, null],
    ['Needs reply', needsReply, 'high'],
    ['New leads', newLeads, 'leads'],
    ['Noise filtered', noiseFiltered, null],
  ];
  el.innerHTML = stats.map(([label, value, nav]) => `
    <div class="stat-card" ${nav ? `onclick="setNav('${nav}')" style="cursor:pointer"` : ''}>
      <div class="stat-label">${label}</div>
      <div class="stat-value">${value}</div>
    </div>
  `).join('');
}

const ACCOUNT_COLORS = [
  "#C97A41", // clay
  "#6A7350", // moss
  "#3D6A82", // slate blue
  "#8C4F73", // plum
  "#7A6A4F", // tan
];

function colorForLabel(label) {
  let hash = 0;
  for (let i = 0; i < (label || "").length; i++) hash += label.charCodeAt(i);
  return ACCOUNT_COLORS[hash % ACCOUNT_COLORS.length];
}

function initialsForLabel(value) {
  if (!value) return "?";
  const local = value.split('@')[0];
  const parts = local.split(/[._-]/).filter(Boolean);
  if (parts.length >= 2) return (parts[0][0] + parts[1][0]).toUpperCase();
  return local.substring(0, 2).toUpperCase();
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str || '';
  return div.innerHTML;
}

async function loadDigest() {
  const contentEl = document.getElementById('content');
  const metaEl = document.getElementById('meta');
  setGreeting();

  try {
    const res = await fetch('digest.json?t=' + Date.now());
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();

    const generated = new Date(data.generated_at);
    metaEl.textContent = `Last checked: ${generated.toLocaleString()} · ${data.total_important} important of ${data.total_checked} checked`;

    allItems = data.important || [];
    digestMeta = { total_checked: data.total_checked || 0, total_important: data.total_important || 0 };
    renderSyncStrip(data.account_status);
    renderStatCards();
    render();
  } catch (e) {
    metaEl.textContent = '';
    contentEl.innerHTML = `<div class="error">Could not load digest: ${e.message}</div>`;
  }
}

function setFilter(pri) {
  activeFilter = pri;
  activeNav = pri === 'high' ? 'high' : 'inbox';
  showHandled = false;
  render();
}

document.getElementById('search-input').addEventListener('input', render);

function groupLabel(d) {
  const now = new Date();
  const startToday = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  const startYesterday = new Date(startToday); startYesterday.setDate(startYesterday.getDate() - 1);
  const startWeek = new Date(startToday); startWeek.setDate(startWeek.getDate() - 7);
  if (d >= startToday) return "Today";
  if (d >= startYesterday) return "Yesterday";
  if (d >= startWeek) return "Earlier this week";
  return "Older";
}

function formatTime(d, group) {
  if (group === "Today") {
    return d.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' });
  }
  return d.toLocaleDateString([], { month: 'short', day: 'numeric' });
}

function render() {
  const contentEl = document.getElementById('content');
  const query = document.getElementById('search-input').value.trim().toLowerCase();

  syncNavActive();

  const handledCount = allItems.filter(isHandled).length;
  const handledToggleEl = document.getElementById('handled-toggle');
  handledToggleEl.textContent = `Handled (${handledCount})`;
  handledToggleEl.classList.toggle('active-toggle', showHandled);

  let items = allItems.filter(item => {
    const handled = isHandled(item);
    if (showHandled) {
      if (!handled) return false;
    } else {
      if (handled) return false;
    }
    if (activeNav === 'leads' && !isLead(item)) return false;
    if (activeFilter !== "all" && (item.priority || "low") !== activeFilter) return false;
    if (query) {
      const haystack = `${item.subject} ${item.from} ${item.snippet} ${item.account_email}`.toLowerCase();
      if (!haystack.includes(query)) return false;
    }
    return true;
  });

  if (items.length === 0) {
    contentEl.innerHTML = `<div class="empty">${showHandled ? 'No handled emails yet.' : 'No matching emails.'}</div>`;
    return;
  }

  // Sort newest first
  items.sort((a, b) => new Date(b.date) - new Date(a.date));

  // Group by date bucket, preserving order
  const groups = {};
  const groupOrder = ["Today", "Yesterday", "Earlier this week", "Older"];
  items.forEach(item => {
    const d = new Date(item.date);
    const g = groupLabel(d);
    if (!groups[g]) groups[g] = [];
    groups[g].push(item);
  });

  rowDataMap = {};
  let html = "";
  groupOrder.forEach(g => {
    if (!groups[g] || groups[g].length === 0) return;
    html += `<div class="date-group-label">${g}</div><div class="inbox-list">`;
    html += groups[g].map((item, idx) => {
      const rowId = g + "-" + idx;
      rowDataMap[rowId] = item;
      return renderRow(item, rowId);
    }).join("");
    html += `</div>`;
  });

  contentEl.innerHTML = html;
}

function extractEmail(str) {
  const angle = (str || "").match(/<([^>]+)>/);
  if (angle) return angle[1];
  const bare = (str || "").match(/[\w.+-]+@[\w-]+\.[\w.-]+/);
  return bare ? bare[0] : "";
}

function buildReplyUrl(item) {
  const senderEmail = extractEmail(item.from);
  const to = encodeURIComponent(senderEmail);
  const subject = encodeURIComponent("Re: " + (item.subject || ""));
  const accountEmail = item.account_email || "";

  if (accountEmail.includes("outlook.com")) {
    return `https://outlook.live.com/mail/0/deeplink/compose?to=${to}&subject=${subject}`;
  }
  if (accountEmail.includes("saharsh.co")) {
    return `https://mail.zoho.com/zm/#mail/compose?to=${to}&subject=${subject}`;
  }
  // Default: Gmail, scoped to the correct one of the 3 Gmail accounts
  return `https://mail.google.com/mail/?authuser=${encodeURIComponent(accountEmail)}&view=cm&fs=1&to=${to}&su=${subject}`;
}

function openReply(rowId) {
  const item = rowDataMap[rowId];
  if (!item) return;
  window.open(buildReplyUrl(item), '_blank');
}

function buildOpenUrl(item) {
  const accountEmail = item.account_email || "";
  const subjectQuery = encodeURIComponent(item.subject || "");

  if (accountEmail.includes("gmail.com")) {
    if (item.message_id) {
      // Exact deep link to the message
      return `https://mail.google.com/mail/?authuser=${encodeURIComponent(accountEmail)}#search/rfc822msgid:${encodeURIComponent(item.message_id)}`;
    }
    // Fallback: search by subject
    return `https://mail.google.com/mail/?authuser=${encodeURIComponent(accountEmail)}#search/${subjectQuery}`;
  }
  if (accountEmail.includes("outlook.com")) {
    // Best-effort: Outlook web doesn't expose a Message-ID deep link via IMAP data
    return `https://outlook.live.com/mail/0/inbox?q=${subjectQuery}`;
  }
  if (accountEmail.includes("saharsh.co")) {
    // Best-effort: Zoho search by subject
    return `https://mail.zoho.com/zm/#search/Inbox?searchText=${subjectQuery}`;
  }
  return null;
}

function openOnProvider(rowId) {
  const item = rowDataMap[rowId];
  if (!item) return;
  const url = buildOpenUrl(item);
  if (url) window.open(url, '_blank');
}

function renderRow(item, rowId) {
  const priority = item.priority || 'low';
  const date = new Date(item.date);
  const group = groupLabel(date);
  const color = colorForLabel(item.account_email);
  const initials = initialsForLabel(item.account_email);
  const handled = isHandled(item);

  const attachments = item.attachments || [];
  const hasAttachments = attachments.length > 0;

  return `
    <div class="row ${priority} ${handled ? 'handled-view' : ''}" id="row-${rowId}" onclick="toggleRow('${rowId}')">
      <input type="checkbox" class="row-checkbox" ${handled ? 'checked' : ''} onclick="event.stopPropagation(); toggleHandled('${rowId}')" aria-label="Mark handled">
      <div class="avatar" style="background:${color};">${escapeHtml(initials)}</div>
      <div class="row-main">
        <div class="row-top">
          <div class="row-subject">${hasAttachments ? '📎 ' : ''}${escapeHtml(item.subject)}</div>
          <div class="row-time">${formatTime(date, group)}</div>
        </div>
        <div class="row-preview">${escapeHtml(item.snippet)}</div>
        <div class="row-detail">
          <div class="from-line">${escapeHtml(item.from)} · ${escapeHtml(item.account_email)} · ${date.toLocaleString()}</div>
          ${hasAttachments ? `<div class="attachment-line">📎 ${attachments.map(escapeHtml).join(', ')}</div>` : ''}
          <div class="snippet-full">${escapeHtml(item.snippet)}</div>
          <div class="reason-full">💡 ${escapeHtml(item.reason)}</div>
          <div class="action-row">
            <button class="open-btn" onclick="event.stopPropagation(); openOnProvider('${rowId}')">Open ↗</button>
            <button class="reply-btn" onclick="event.stopPropagation(); openReply('${rowId}')">Reply ↗</button>
          </div>
        </div>
      </div>
    </div>
  `;
}

function toggleRow(rowId) {
  const row = document.getElementById('row-' + rowId);
  if (row) row.classList.toggle('expanded');
}

async function triggerFetch() {
  const btn = document.getElementById("fetch-btn");
  const status = document.getElementById("fetch-status");
  btn.disabled = true;
  btn.textContent = "Triggering…";
  status.textContent = "";
  try {
    const resp = await fetch(
      "https://api.github.com/repos/saharshcabins/email-digest/actions/workflows/check-emails.yml/dispatches",
      {
        method: "POST",
        headers: {
          "Authorization": "Bearer " + ["github_pat_11CB4LX3I0","kL055LPvzeg2_6maQ7mjth","EJiYCgciOZXra8Ru9EYg5JPZrhPmlSwAB3PG6QGXPYgthLBXJn"].join(""),
          "Accept": "application/vnd.github+json",
          "Content-Type": "application/json",
        },
        body: JSON.stringify({ ref: "main" }),
      }
    );
    if (resp.status === 204) {
      btn.textContent = "Fetch Now";
      btn.disabled = false;
      status.textContent = "✓ Triggered! Dashboard updates in ~2 minutes.";
    } else {
      throw new Error("HTTP " + resp.status);
    }
  } catch (e) {
    btn.textContent = "Fetch Now";
    btn.disabled = false;
    status.textContent = "Error: " + e.message;
  }
}
