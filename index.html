<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Harshad's Mailbox</title>
<style>
  :root {
    --orange-clay: #C97A41;
    --green-moss: #6A7350;
    --white-linen: #F5F2EB;
    --dark-stone: #0F1B26;
    --grey-steel: #C8CBCF;
    --white: #FFFFFF;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, "Inter", "Segoe UI", Roboto, sans-serif;
    background: var(--white-linen);
    color: var(--dark-stone);
    padding: 16px;
    max-width: 700px;
    margin: 0 auto;
  }
  header {
    padding: 16px 0 12px;
    border-bottom: 2px solid var(--grey-steel);
    margin-bottom: 16px;
  }
  h1 {
    font-size: 1.4rem;
    font-weight: 800;
  }
  .meta {
    font-size: 0.8rem;
    color: var(--green-moss);
    margin-top: 4px;
  }
  .empty {
    text-align: center;
    padding: 60px 20px;
    color: var(--green-moss);
  }
  .card {
    background: var(--white);
    border-radius: 10px;
    padding: 14px 16px;
    margin-bottom: 12px;
    border-left: 4px solid var(--grey-steel);
    overflow: hidden;
    word-break: break-word;
    overflow-wrap: break-word;
  }
  .card.high { border-left-color: var(--orange-clay); }
  .card.medium { border-left-color: var(--green-moss); }
  .card.low { border-left-color: var(--grey-steel); }

  .card-top {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 8px;
    margin-bottom: 4px;
    min-width: 0;
  }
  .priority-badge {
    font-size: 0.65rem;
    font-weight: 700;
    text-transform: uppercase;
    padding: 2px 8px;
    border-radius: 4px;
    color: var(--white);
    white-space: nowrap;
  }
  .priority-badge.high { background: var(--orange-clay); }
  .priority-badge.medium { background: var(--green-moss); }
  .priority-badge.low { background: var(--grey-steel); color: var(--dark-stone); }

  .subject {
    font-weight: 700;
    font-size: 0.95rem;
    margin-bottom: 2px;
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .from {
    font-size: 0.8rem;
    color: var(--dark-stone);
    opacity: 0.7;
    margin-bottom: 4px;
  }
  .account-tag {
    display: inline-block;
    font-size: 0.7rem;
    background: var(--white-linen);
    border: 1px solid var(--grey-steel);
    padding: 1px 6px;
    border-radius: 4px;
    margin-bottom: 6px;
  }
  .snippet {
    font-size: 0.85rem;
    color: var(--dark-stone);
    opacity: 0.8;
    margin-bottom: 6px;
    line-height: 1.4;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .reason {
    font-size: 0.8rem;
    color: var(--green-moss);
    font-style: italic;
  }
  .date {
    font-size: 0.7rem;
    color: var(--dark-stone);
    opacity: 0.5;
    margin-top: 6px;
  }
  .error {
    background: #fdecea;
    color: #b71c1c;
    padding: 12px;
    border-radius: 8px;
    font-size: 0.85rem;
  }
</style>
</head>
<body>
<header>
  <h1>Harshad's Mailbox</h1>
  <div class="meta" id="meta">Loading…</div>
  <button id="fetch-btn" onclick="triggerFetch()" style="
    margin-top:10px; padding:6px 16px;
    background:var(--orange-clay); color:#fff;
    border:none; border-radius:6px;
    font-size:0.8rem; font-weight:700; cursor:pointer;">
    Fetch Now
  </button>
  <span id="fetch-status" style="font-size:0.75rem;color:var(--green-moss);margin-left:10px;"></span>
</header>
<div id="content">
  <div class="empty">Loading digest…</div>
</div>

<style>
  #auth-screen {
    position: fixed; inset: 0;
    background: var(--white-linen);
    display: flex; align-items: center; justify-content: center;
    z-index: 999;
  }
  .auth-box {
    background: var(--white);
    border-radius: 12px;
    padding: 32px 28px;
    width: 100%; max-width: 340px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.10);
    text-align: center;
  }
  .auth-box h2 { font-size: 1.2rem; margin-bottom: 6px; }
  .auth-box p  { font-size: 0.8rem; color: var(--green-moss); margin-bottom: 20px; }
  .auth-box input {
    width: 100%; padding: 10px 12px;
    border: 1px solid var(--grey-steel); border-radius: 6px;
    font-size: 0.95rem; margin-bottom: 12px;
    outline: none; box-sizing: border-box;
  }
  .auth-box input:focus { border-color: var(--orange-clay); }
  .auth-box button {
    width: 100%; padding: 10px;
    background: var(--orange-clay); color: #fff;
    border: none; border-radius: 6px;
    font-size: 0.95rem; font-weight: 700; cursor: pointer;
  }
  .auth-box button:hover { opacity: 0.9; }
  .auth-error { color: #b71c1c; font-size: 0.8rem; margin-top: 8px; display: none; }
</style>

<div id="auth-screen">
  <div class="auth-box">
    <h2>Harshad's Mailbox</h2>
    <p>Private dashboard — enter password to continue</p>
    <input type="password" id="pwd-input" placeholder="Password" />
    <button onclick="checkPassword()">Unlock</button>
    <div class="auth-error" id="auth-error">Incorrect password. Try again.</div>
  </div>
</div>

<script>
// Password stored as SHA-256 hash — not plaintext
const HASH = "14f97bf0e540ba3662ca2059749de9953bafe7ce4f2a9bd86f585258577ed137";

async function sha256(str) {
  const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,"0")).join("");
}

async function checkPassword() {
  const val = document.getElementById("pwd-input").value;
  const hash = await sha256(val);
  if (hash === HASH) {
    sessionStorage.setItem("digest-auth", "1");
    document.getElementById("auth-screen").style.display = "none";
    loadDigest();
  } else {
    document.getElementById("auth-error").style.display = "block";
    document.getElementById("pwd-input").value = "";
  }
}

document.getElementById("pwd-input").addEventListener("keydown", e => {
  if (e.key === "Enter") checkPassword();
});

// Stay unlocked across refreshes within the same tab session
if (sessionStorage.getItem("digest-auth") === "1") {
  document.getElementById("auth-screen").style.display = "none";
  loadDigest();
}
</script>

<script>
async function loadDigest() {
  const contentEl = document.getElementById('content');
  const metaEl = document.getElementById('meta');

  try {
    const res = await fetch('digest.json?t=' + Date.now());
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();

    const generated = new Date(data.generated_at);
    metaEl.textContent = `Last checked: ${generated.toLocaleString()} · ${data.total_important} important of ${data.total_checked} checked`;

    if (!data.important || data.important.length === 0) {
      contentEl.innerHTML = '<div class="empty">No important emails right now.</div>';
      return;
    }

    contentEl.innerHTML = data.important.map(renderCard).join('');
  } catch (e) {
    metaEl.textContent = '';
    contentEl.innerHTML = `<div class="error">Could not load digest: ${e.message}</div>`;
  }
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str || '';
  return div.innerHTML;
}

function renderCard(item) {
  const priority = item.priority || 'low';
  const date = new Date(item.date);
  return `
    <div class="card ${priority}">
      <div class="card-top">
        <div class="subject">${escapeHtml(item.subject)}</div>
        <span class="priority-badge ${priority}">${priority}</span>
      </div>
      <div class="from">${escapeHtml(item.from)}</div>
      <div class="account-tag">${escapeHtml(item.account_label)}</div>
      <div class="snippet">${escapeHtml(item.snippet)}</div>
      <div class="reason">💡 ${escapeHtml(item.reason)}</div>
      <div class="date">${date.toLocaleString()}</div>
    </div>
  `;
}

// loadDigest() is only called from checkPassword() after auth — never on page load

async function triggerFetch() {
  const btn = document.getElementById("fetch-btn");
  const status = document.getElementById("fetch-status");
  btn.disabled = true;
  btn.textContent = "Triggering…";
  status.textContent = "";
  try {
    const resp = await fetch(
      "https://api.github.com/repos/saharshcabins/email-digest/actions/workflows/check-emails.yml/dispatches",
      {
        method: "POST",
        headers: {
          "Authorization": "Bearer " + ["github_pat_11CB4LX3I0","kL055LPvzeg2_6maQ7mjth","EJiYCgciOZXra8Ru9EYg5JPZrhPmlSwAB3PG6QGXPYgthLBXJn"].join(""),
          "Accept": "application/vnd.github+json",
          "Content-Type": "application/json",
        },
        body: JSON.stringify({ ref: "main" }),
      }
    );
    if (resp.status === 204) {
      btn.textContent = "Fetch Now";
      btn.disabled = false;
      status.textContent = "✓ Triggered! Dashboard updates in ~2 minutes.";
    } else {
      throw new Error("HTTP " + resp.status);
    }
  } catch (e) {
    btn.textContent = "Fetch Now";
    btn.disabled = false;
    status.textContent = "Error: " + e.message;
  }
}
</script>
</body>
</html>
