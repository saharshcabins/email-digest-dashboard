<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Harshad's Mailbox</title>
<style>
  :root {
    --orange-clay: #C97A41;
    --green-moss: #6A7350;
    --white-linen: #F5F2EB;
    --dark-stone: #0F1B26;
    --grey-steel: #C8CBCF;
    --white: #FFFFFF;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, "Inter", "Segoe UI", Roboto, sans-serif;
    background: var(--white-linen);
    color: var(--dark-stone);
    padding: 16px;
    max-width: 700px;
    margin: 0 auto;
  }
  header {
    padding: 16px 0 12px;
    margin-bottom: 8px;
  }
  h1 {
    font-size: 1.4rem;
    font-weight: 800;
  }
  .meta {
    font-size: 0.8rem;
    color: var(--green-moss);
    margin-top: 4px;
  }
  .empty {
    text-align: center;
    padding: 60px 20px;
    color: var(--green-moss);
  }
  .error {
    background: #fdecea;
    color: #b71c1c;
    padding: 12px;
    border-radius: 8px;
    font-size: 0.85rem;
  }

  /* Sticky toolbar: search + filter chips */
  .toolbar {
    position: sticky;
    top: 0;
    background: var(--white-linen);
    padding: 10px 0;
    border-bottom: 2px solid var(--grey-steel);
    margin-bottom: 14px;
    z-index: 10;
  }
  .search-input {
    width: 100%;
    padding: 8px 12px;
    border: 1px solid var(--grey-steel);
    border-radius: 8px;
    font-size: 0.85rem;
    outline: none;
    margin-bottom: 8px;
    background: var(--white);
    color: var(--dark-stone);
  }
  .search-input:focus { border-color: var(--orange-clay); }
  .filter-chips { display: flex; gap: 6px; flex-wrap: wrap; }
  .chip {
    font-size: 0.75rem;
    font-weight: 700;
    padding: 4px 12px;
    border-radius: 999px;
    border: 1px solid var(--grey-steel);
    background: var(--white);
    color: var(--dark-stone);
    cursor: pointer;
    opacity: 0.65;
  }
  .chip.active { opacity: 1; border-color: transparent; color: var(--white); }
  .chip.active[data-pri="all"]    { background: var(--dark-stone); }
  .chip.active[data-pri="high"]   { background: var(--orange-clay); }
  .chip.active[data-pri="medium"] { background: var(--green-moss); }
  .chip.active[data-pri="low"]    { background: var(--grey-steel); color: var(--dark-stone); }

  /* Date group headers */
  .date-group-label {
    font-size: 0.7rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    color: var(--green-moss);
    margin: 18px 4px 8px;
  }
  .date-group-label:first-child { margin-top: 0; }

  /* Inbox list container */
  .inbox-list {
    background: var(--white);
    border-radius: 10px;
    border: 1px solid var(--grey-steel);
    overflow: hidden;
  }

  /* Row */
  .row {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 10px 12px;
    border-bottom: 1px solid var(--white-linen);
    border-left: 3px solid var(--grey-steel);
    cursor: pointer;
  }
  .row:last-child { border-bottom: none; }
  .row:hover { background: var(--white-linen); }
  .row.high   { border-left-color: var(--orange-clay); }
  .row.medium { border-left-color: var(--green-moss); }
  .row.low    { border-left-color: var(--grey-steel); }

  .avatar {
    width: 30px; height: 30px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.7rem; font-weight: 700;
    flex-shrink: 0;
    color: var(--white);
  }

  .row-main { flex: 1; min-width: 0; }
  .row-top {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 8px;
    min-width: 0;
  }
  .row-subject {
    font-weight: 700;
    font-size: 0.9rem;
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .row-time {
    font-size: 0.7rem;
    color: var(--dark-stone);
    opacity: 0.55;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .row-preview {
    font-size: 0.8rem;
    color: var(--dark-stone);
    opacity: 0.7;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    margin-top: 2px;
  }

  /* Expanded detail */
  .row-detail {
    display: none;
    margin-top: 8px;
    padding-top: 8px;
    border-top: 1px solid var(--white-linen);
    font-size: 0.85rem;
    line-height: 1.45;
  }
  .row.expanded .row-detail { display: block; }
  .row.expanded .row-preview { display: none; }
  .row-detail .from-line {
    font-size: 0.75rem;
    color: var(--dark-stone);
    opacity: 0.65;
    margin-bottom: 6px;
  }
  .row-detail .snippet-full {
    margin-bottom: 6px;
  }
  .row-detail .reason-full {
    color: var(--green-moss);
    font-style: italic;
    font-size: 0.8rem;
  }

  #auth-screen {
    position: fixed; inset: 0;
    background: var(--white-linen);
    display: flex; align-items: center; justify-content: center;
    z-index: 999;
  }
  .auth-box {
    background: var(--white);
    border-radius: 12px;
    padding: 32px 28px;
    width: 100%; max-width: 340px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.10);
    text-align: center;
  }
  .auth-box h2 { font-size: 1.2rem; margin-bottom: 6px; }
  .auth-box p  { font-size: 0.8rem; color: var(--green-moss); margin-bottom: 20px; }
  .auth-box input {
    width: 100%; padding: 10px 12px;
    border: 1px solid var(--grey-steel); border-radius: 6px;
    font-size: 0.95rem; margin-bottom: 12px;
    outline: none; box-sizing: border-box;
  }
  .auth-box input:focus { border-color: var(--orange-clay); }
  .auth-box button {
    width: 100%; padding: 10px;
    background: var(--orange-clay); color: #fff;
    border: none; border-radius: 6px;
    font-size: 0.95rem; font-weight: 700; cursor: pointer;
  }
  .auth-box button:hover { opacity: 0.9; }
  .auth-error { color: #b71c1c; font-size: 0.8rem; margin-top: 8px; display: none; }
</style>
</head>
<body>

<div id="auth-screen">
  <div class="auth-box">
    <h2>Harshad's Mailbox</h2>
    <p>Private dashboard — enter password to continue</p>
    <input type="password" id="pwd-input" placeholder="Password" />
    <button onclick="checkPassword()">Unlock</button>
    <div class="auth-error" id="auth-error">Incorrect password. Try again.</div>
  </div>
</div>

<header>
  <h1>Harshad's Mailbox</h1>
  <div class="meta" id="meta">Loading…</div>
  <button id="fetch-btn" onclick="triggerFetch()" style="
    margin-top:10px; padding:6px 16px;
    background:var(--orange-clay); color:#fff;
    border:none; border-radius:6px;
    font-size:0.8rem; font-weight:700; cursor:pointer;">
    Fetch Now
  </button>
  <span id="fetch-status" style="font-size:0.75rem;color:var(--green-moss);margin-left:10px;"></span>
</header>

<div class="toolbar">
  <input type="text" class="search-input" id="search-input" placeholder="Search sender, subject, or content…" />
  <div class="filter-chips" id="filter-chips">
    <span class="chip active" data-pri="all" onclick="setFilter('all')">All</span>
    <span class="chip" data-pri="high" onclick="setFilter('high')">High</span>
    <span class="chip" data-pri="medium" onclick="setFilter('medium')">Medium</span>
    <span class="chip" data-pri="low" onclick="setFilter('low')">Low</span>
  </div>
</div>

<div id="content">
  <div class="empty">Loading digest…</div>
</div>

<script>
// Password stored as SHA-256 hash — not plaintext
const HASH = "14f97bf0e540ba3662ca2059749de9953bafe7ce4f2a9bd86f585258577ed137";

async function sha256(str) {
  const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,"0")).join("");
}

async function checkPassword() {
  const val = document.getElementById("pwd-input").value;
  const hash = await sha256(val);
  if (hash === HASH) {
    sessionStorage.setItem("digest-auth", "1");
    document.getElementById("auth-screen").style.display = "none";
    loadDigest();
  } else {
    document.getElementById("auth-error").style.display = "block";
    document.getElementById("pwd-input").value = "";
  }
}

document.getElementById("pwd-input").addEventListener("keydown", e => {
  if (e.key === "Enter") checkPassword();
});

// Stay unlocked across refreshes within the same tab session
if (sessionStorage.getItem("digest-auth") === "1") {
  document.getElementById("auth-screen").style.display = "none";
  loadDigest();
}
</script>

<script>
let allItems = [];
let activeFilter = "all";

const ACCOUNT_COLORS = [
  "#C97A41", // clay
  "#6A7350", // moss
  "#3D6A82", // slate blue
  "#8C4F73", // plum
  "#7A6A4F", // tan
];

function colorForLabel(label) {
  let hash = 0;
  for (let i = 0; i < (label || "").length; i++) hash += label.charCodeAt(i);
  return ACCOUNT_COLORS[hash % ACCOUNT_COLORS.length];
}

function initialsForLabel(label) {
  if (!label) return "?";
  const words = label.replace(/[()]/g, "").split(/\s+/).filter(Boolean);
  if (words.length >= 2) return (words[0][0] + words[1][0]).toUpperCase();
  return label.substring(0, 2).toUpperCase();
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str || '';
  return div.innerHTML;
}

async function loadDigest() {
  const contentEl = document.getElementById('content');
  const metaEl = document.getElementById('meta');

  try {
    const res = await fetch('digest.json?t=' + Date.now());
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();

    const generated = new Date(data.generated_at);
    metaEl.textContent = `Last checked: ${generated.toLocaleString()} · ${data.total_important} important of ${data.total_checked} checked`;

    allItems = data.important || [];
    render();
  } catch (e) {
    metaEl.textContent = '';
    contentEl.innerHTML = `<div class="error">Could not load digest: ${e.message}</div>`;
  }
}

function setFilter(pri) {
  activeFilter = pri;
  document.querySelectorAll('.chip').forEach(c => {
    c.classList.toggle('active', c.dataset.pri === pri);
  });
  render();
}

document.getElementById('search-input').addEventListener('input', render);

function groupLabel(d) {
  const now = new Date();
  const startToday = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  const startYesterday = new Date(startToday); startYesterday.setDate(startYesterday.getDate() - 1);
  const startWeek = new Date(startToday); startWeek.setDate(startWeek.getDate() - 7);
  if (d >= startToday) return "Today";
  if (d >= startYesterday) return "Yesterday";
  if (d >= startWeek) return "Earlier this week";
  return "Older";
}

function formatTime(d, group) {
  if (group === "Today") {
    return d.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' });
  }
  return d.toLocaleDateString([], { month: 'short', day: 'numeric' });
}

function render() {
  const contentEl = document.getElementById('content');
  const query = document.getElementById('search-input').value.trim().toLowerCase();

  let items = allItems.filter(item => {
    if (activeFilter !== "all" && (item.priority || "low") !== activeFilter) return false;
    if (query) {
      const haystack = `${item.subject} ${item.from} ${item.snippet} ${item.account_label}`.toLowerCase();
      if (!haystack.includes(query)) return false;
    }
    return true;
  });

  if (items.length === 0) {
    contentEl.innerHTML = '<div class="empty">No matching emails.</div>';
    return;
  }

  // Sort newest first
  items.sort((a, b) => new Date(b.date) - new Date(a.date));

  // Group by date bucket, preserving order
  const groups = {};
  const groupOrder = ["Today", "Yesterday", "Earlier this week", "Older"];
  items.forEach(item => {
    const d = new Date(item.date);
    const g = groupLabel(d);
    if (!groups[g]) groups[g] = [];
    groups[g].push(item);
  });

  let html = "";
  groupOrder.forEach(g => {
    if (!groups[g] || groups[g].length === 0) return;
    html += `<div class="date-group-label">${g}</div><div class="inbox-list">`;
    html += groups[g].map((item, idx) => renderRow(item, g + "-" + idx)).join("");
    html += `</div>`;
  });

  contentEl.innerHTML = html;
}

function renderRow(item, rowId) {
  const priority = item.priority || 'low';
  const date = new Date(item.date);
  const group = groupLabel(date);
  const color = colorForLabel(item.account_label);
  const initials = initialsForLabel(item.account_label);

  return `
    <div class="row ${priority}" id="row-${rowId}" onclick="toggleRow('${rowId}')">
      <div class="avatar" style="background:${color};">${escapeHtml(initials)}</div>
      <div class="row-main">
        <div class="row-top">
          <div class="row-subject">${escapeHtml(item.subject)}</div>
          <div class="row-time">${formatTime(date, group)}</div>
        </div>
        <div class="row-preview">${escapeHtml(item.snippet)}</div>
        <div class="row-detail">
          <div class="from-line">${escapeHtml(item.from)} · ${escapeHtml(item.account_label)} · ${date.toLocaleString()}</div>
          <div class="snippet-full">${escapeHtml(item.snippet)}</div>
          <div class="reason-full">💡 ${escapeHtml(item.reason)}</div>
        </div>
      </div>
    </div>
  `;
}

function toggleRow(rowId) {
  const row = document.getElementById('row-' + rowId);
  if (row) row.classList.toggle('expanded');
}

async function triggerFetch() {
  const btn = document.getElementById("fetch-btn");
  const status = document.getElementById("fetch-status");
  btn.disabled = true;
  btn.textContent = "Triggering…";
  status.textContent = "";
  try {
    const resp = await fetch(
      "https://api.github.com/repos/saharshcabins/email-digest/actions/workflows/check-emails.yml/dispatches",
      {
        method: "POST",
        headers: {
          "Authorization": "Bearer " + ["github_pat_11CB4LX3I0","kL055LPvzeg2_6maQ7mjth","EJiYCgciOZXra8Ru9EYg5JPZrhPmlSwAB3PG6QGXPYgthLBXJn"].join(""),
          "Accept": "application/vnd.github+json",
          "Content-Type": "application/json",
        },
        body: JSON.stringify({ ref: "main" }),
      }
    );
    if (resp.status === 204) {
      btn.textContent = "Fetch Now";
      btn.disabled = false;
      status.textContent = "✓ Triggered! Dashboard updates in ~2 minutes.";
    } else {
      throw new Error("HTTP " + resp.status);
    }
  } catch (e) {
    btn.textContent = "Fetch Now";
    btn.disabled = false;
    status.textContent = "Error: " + e.message;
  }
}
</script>
</body>
</html>
